name: Update Strava Data

on:
  # Run every 6 hours
  schedule:
    - cron: '7 */6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-strava:
    runs-on: ubuntu-latest

    # Needs write permission to commit strava-data.json back to the repo
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Strava activities
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python fetch_strava.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add strava-data.json
          # Only commit if the file actually changed
          git diff --staged --quiet \
            || git commit -m "chore: update strava data [skip ci]"
          git push
